<breadcrumb [path]="[
        [_url.link(['REPORT']), s.parse('bread.list')],
        [_url.link(['REPORT', 'NEW']), s.parse('bread.new')]
    ]"></breadcrumb>

<div class="new-report-form">
    <form #newReportForm="ngForm"
          (ngSubmit)="generateReport()">

        <div class="form-group template-select-field mb-4">
            <label class="form-label">{{s.parse('new.reportType')}}</label>
            <select name="reportTemplate" id="reportTemplate"
                    class="form-control form-select"
                    title="{{s.parse('new.reportType')}}"
                    [(ngModel)]="template"
                    #reportTemplate="ngModel">
                <!--<option value="" disabled="disabled">bitte Auswählen</option>-->
                <option *ngFor="let tem of  (reportTemplates$ | async) " [value]="tem.id" [selected]="template==tem.id" >{{tem.description}}</option>
            </select>
        </div>
