<div
  class="report-single-view container my-5 mx-auto p-5 rounded bg-grey-lightest"
  id="report-list-{{ report.id }}"
>
  <div class="flex justify-between">
    <div class="w-1/2 font-medium text-xl">
      {{ report.name }}
    </div>
    <div class="flex report-view-actions">
      <a title="Diesen Bericht herunterladen" class="w-1/3 p-3 w-12 h-12">
        <i class="fas fa-cloud-download-alt"></i>
      </a>
      <a title="Detailansicht des Berichts" class="w-1/3  p-3 w-12 h-12">
        <i class="far fa-eye"></i>
      </a>
      <a title="Zurück zum Berichtsübersicht" class="w-1/3  p-3 w-12 h-12">
        <i class="fas fa-angle-double-left"></i>
      </a>
    </div>
  </div>
  <div class="flex flex-row mt-1">
    <div class="w-1/5">Status:</div>
    <div class="">
      <b>{{ report.status }}</b>
    </div>
  </div>
  <div class="flex flex-row mt-1">
    <div class="w-1/5">Erstelldatum:</div>
    <div class="">{{ report.generationDate | date: "mediumDate" }}</div>
  </div>
  <div class="flex flex-row mt-1">
    <div class="w-1/5">Zeitraum:</div>
    <div class="">
      {{ report.timespan[0] | date: "shortDate" }} bis {{ report.timespan[1] | date: "shortDate" }}
    </div>
  </div>
</div>
